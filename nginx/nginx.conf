server {
        listen 80;
        server_name api.versusfit.ru;

        return 301 https://$host$request_uri;
}

server {
        listen 443 ssl;
        server_name api.versusfit.ru;

        ssl_certificate /etc/nginx/certs/api.versusfit.crt;
        ssl_certificate_key /etc/nginx/certs/api.versusfit.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000" always;

        location /ws {
                proxy_pass http://fastapi:8000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 86400;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
        }

        location /api/ {
                proxy_pass http://fastapi:8000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
        }

        location / {
                proxy_pass http://fastapi:8000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
        }
}

server {
        listen 80;
        server_name versusfit.ru;

        return 301 https://$host$request_uri;
}

server {
        listen 443 ssl;
        server_name versusfit.ru;
 
        root /var/www/html/public;
        index index.php;

        access_log /var/log/nginx/versusfit-access.log;
        error_log /var/log/nginx/versusfit-error.log; 

        ssl_certificate /etc/nginx/certs/versusfit.crt;
        ssl_certificate_key /etc/nginx/certs/versusfit.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000" always;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
                expires 7d;
                add_header Cache-Control "public, no-transform";
                add_header Strict-Transport-Security "max-age=31536000" always;
        }

        location / { 
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass laravel:9000; 
            fastcgi_index index.php; 
            include fastcgi_params; 
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name; 
            fastcgi_param DOCUMENT_ROOT $realpath_root;

            fastcgi_param HTTPS on;
        }
}